<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Equipos Multimedia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Reserva de Equipos Multimedia</h1>
    </div>

    <div id="form-container">
    <form>
        <label for="name">Nombre del solicitante</label>
        <input type="text" id="name" placeholder="Ingrese nombre"><br>
        <label for="area">Área del solicitante</label>
        <input type="text" id="area" placeholder="Ingrese área"><br>
        <label for="equipo">Equipo a reservar</label>
        <input type="text" id="equipo" placeholder="Ingrese equipo"><br>
        <label for="fecha">Fecha de reserva</label>
        <input type="date" id="fecha" placeholder="Fecha a reservar"><br>
        <label for="hora">Hora de reserva</label>
        <input type="text" id="hora" placeholder="Hora a reservar"><br>
        <label for="lugar">Lugar de reserva</label>
        <input type="text" id="lugar" placeholder="Lugar"><br>
        <button type="submit">Registrar reserva</button>
    </form>
    </div>
</body>
</html>
