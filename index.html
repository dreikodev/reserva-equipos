<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Equipos Multimedia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Reserva de Equipos Multimedia</h1>
    </div>

    <div id="form-container">
    <form>
        <div class="fila">
        <label for="name">Nombre del solicitante</label>
        <input type="text" id="name" placeholder="Ingrese nombre">
        </div>

        <div class="fila">
        <label for="area">Área del solicitante</label>
        <input type="text" id="area" placeholder="Ingrese área">
        </div>
        
        <div class="fila">
        <label for="equipo">Equipo a reservar</label>
        <input type="text" id="equipo" placeholder="Ingrese equipo">
        </div>

        <div class="fila">
        <label for="fecha">Fecha de reserva</label>
        <input type="date" id="fecha" placeholder="Fecha a reservar">
        </div>

        <div class="fila">
        <label for="hora">Hora de reserva</label>
        <input type="text" id="hora" placeholder="Hora a reservar">
        </div>

        <div class="fila">
        <label for="lugar">Lugar de reserva</label>
        <input type="text" id="lugar" placeholder="Lugar">
        </div>

        <button id="btnRegistrar" type="submit">Registrar reserva</button>
    </form>
    </div>

    <table>
        <thead>
        <tr>
            <th>Nombre del solicitante</th>
            <th>Área del solicitante</th>
            <th>Equipo a reservar</th>
            <th>Fecha de reserva</th>
            <th>Hora de reserva</th>
            <th>Lugar de reserva</th>
        </tr>
        </thead>
        
        <tbody id="tablaReservas">

        </tbody>

    </table>

    <script src="script.js"></script>
</body>
</html>
